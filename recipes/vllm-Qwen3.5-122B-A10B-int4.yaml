model: bleysg/Qwen3.5-122B-A10B-int4-fp8-hybrid
container: ghcr.io/aeon-7/aeon-vllm-ultimate:2026-06-18-v0.23.0-dflashfix
env: {}
defaults:
  max_model_len: 262144
  max_num_seqs: 3
  tensor_parallel: 1
  gpu_memory_utilization: 0.90
  port: 8000
  host: 0.0.0.0
  max_batch_tokens: 8192
command: |
  vllm serve bleysg/Qwen3.5-122B-A10B-int4-fp8-hybrid \
    --served-model-name "Qwen3.5-122B-A10B" \
    --host {host} \
    --port {port} \
    --max-model-len {max_model_len} \
    --max-num-seqs {max_num_seqs} \
    --max-num-batched-tokens {max_batch_tokens} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --enable-prefix-caching \
    --enable-chunked-prefill \
    --trust-remote-code \
    --load-format fastsafetensors \
    --attention-backend flash_attn \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_xml \
    --reasoning-parser qwen3 \
    --speculative-config '{"method":"dflash","model":"z-lab/Qwen3.5-122B-A10B-DFlash","num_speculative_tokens":12,"attention_backend":"FLASH_ATTN"}'
recipe_version: '1'
name: cogni-brain-qwen3.5-122b-dflash-dense
cluster_only: false
