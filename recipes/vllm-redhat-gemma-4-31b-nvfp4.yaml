recipe_version: "1"
name: gemma-4-31B-nvfp4-redhat
description: vLLM serving redhat/Gemma-4-31B-IT-NVFP4 
model: redhat/Gemma-4-31B-IT-NVFP4
container: vllm-node

env: {}
solo_only: false
cluster_only: false
mods: []
defaults:
  max_model_len: 160000
  max_num_seqs: 1
  tensor_parallel: 1
  gpu_memory_utilization: 0.90
  port: 8000
  host: 0.0.0.0
  max_batch_tokens: 4096
  block_size: 32
command: |
  vllm serve RedHatAI/gemma-4-31B-it-NVFP4  \
    --max-model-len {max_model_len} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --port {port} \
    --host {host} \
    --max-num-seqs {max_num_seqs} \
    --block-size {block_size} \
    --load-format fastsafetensors \
    --enable-prefix-caching \
    --enable-chunked-prefill \
    --max-num-batched-tokens {max_batch_tokens} \
    --enable-auto-tool-choice \
    --tool-call-parser gemma4 \
    --reasoning-parser gemma4 \
    --chat-template examples/tool_chat_template_gemma4.jinja \
    --limit-mm-per-prompt '{"image": 0, "audio": 0}' \
    --async-scheduling
