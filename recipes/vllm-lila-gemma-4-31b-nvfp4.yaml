name: gemma4-31b-nvfp4-turbo
description: "LilaRest turbo NVFP4 quantization of Gemma-4 31B (Text Only) optimized for a solo DGX Spark"
model: "LilaRest/gemma-4-31B-it-NVFP4-turbo"
metadata:
  model_id: "LilaRest/gemma-4-31B-it-NVFP4-turbo"
  architecture: "gemma4"
  model_dtype: "nvfp4"
  quantization: "modelopt"
runtime: vllm
container: ghcr.io/spark-arena/dgx-vllm-eugr-nightly-tf5:latest
defaults:
  port: 8000
  gpu_memory_utilization: 0.90
  kv_cache_dtype: "fp8"
  max_model_len: 160000
  max_num_seqs: 1
  max_num_batched_tokens: 8192
command: |
  vllm serve {{metadata.model_id}} \
    --host 0.0.0.0 \
    --port {{defaults.port}} \
    --quantization {{metadata.quantization}} \
    --gpu-memory-utilization {{defaults.gpu_memory_utilization}} \
    --kv-cache-dtype {{defaults.kv_cache_dtype}} \
    --max-model-len {{defaults.max_model_len}} \
    --max-num-seqs {{defaults.max_num_seqs}} \
    --max-num-batched-tokens {{defaults.max_num_batched_tokens}}