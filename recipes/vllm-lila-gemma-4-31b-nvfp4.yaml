name: gemma4-31b-nvfp4-turbo
description: LilaRest turbo NVFP4 quantization of Gemma-4 31B (Text Only) optimized for a solo DGX Spark
model: LilaRest/gemma-4-31B-it-NVFP4-turbo

runtime: vllm
container: ghcr.io/spark-arena/dgx-vllm-eugr-nightly-tf5:latest
defaults:
  port: 8000
  host: 0.0.0.0
  gpu_memory_utilization: 0.90
  max_model_len: 160000
  max_num_seqs: 1
  max_num_batched_tokens: 8192
  kv_cache_dtype: fp8
command: |
  vllm serve {model} \
    --host {host} \
    --port {port} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --kv-cache-dtype {kv_cache_dtype} \
    --max-model-len {max_model_len} \
    --max-num-seqs {max_num_seqs} \
    --max-num-batched-tokens {max_num_batched_tokens}