recipe_version: "1"
name: gemma-4-31B-gguf-hcs
description: vLLM serving HauhauCS/Gemma4-31B-QAT-Uncensored-HauhauCS-Balanced-MTP
model: HauhauCS/Gemma4-31B-QAT-Uncensored-HauhauCS-Balanced-MTP
container: vllm-node

env: {}
solo_only: false
cluster_only: false
mods: []
defaults:
  max_model_len: 160000
  max_num_seqs: 1
  tensor_parallel: 1
  gpu_memory_utilization: 0.90
  port: 8000
  host: 0.0.0.0
command: |
  vllm serve HauhauCS/Gemma4-31B-QAT-Uncensored-HauhauCS-Balanced-MTP  \
    --max-model-len {max_model_len} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --port {port} \
    --host {host} \
    --max-num-seqs {max_num_seqs} \
    --load-format fastsafetensors \
    --enable-prefix-caching \
    --enable-chunked-prefill \
    --enable-auto-tool-choice \
    --tool-call-parser gemma4 \
    --reasoning-parser gemma4 \
